name = "vibepub-api"
main = "api/src/index.ts"
compatibility_date = "2024-12-01"

routes = [
  { pattern = "vibepub.dev/*", zone_name = "vibepub.dev" },
  { pattern = "*.vibepub.dev/*", zone_name = "vibepub.dev" }
]

[assets]
directory = "./web"
html_handling = "auto-trailing-slash"
not_found_handling = "none"
binding = "ASSETS"
run_worker_first = true

# All secrets set via `wrangler secret put`:
# GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET, JWT_SECRET

[[d1_databases]]
binding = "DB"
database_name = "vibepub-db"
database_id = "a7270411-4c2b-4b1e-ad40-a332130a6a9b"

[[r2_buckets]]
binding = "APP_BUCKET"
bucket_name = "vibepub-apps"

[ai]
binding = "AI"
